name: "Upload Hub data to Hubverse-hosted AWS S3 Bucket"

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  # id-token write required for AWS auth
  id-token: write

jobs:
  upload:
    # don't run on forked repositories
    if: github.event.repository.fork != true
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Upload to S3 bucket"
        uses: cdcgov/hubhelpr/actions/s3-bucket-upload@main
        with:
          aws_account: "767397675902"
          dry_run: "false"
          enforce_default_branch: "true"
